name: .NET Build and Release

on:
  push:
    tags:
      - '*'
  
permissions:
  contents: write
  
jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            framework: net10.0-windows
            file_name: XmlDocToMd.exe
          - os: ubuntu-latest
            runtime: linux-x64
            framework: net10.0
            file_name: XmlDocToMd
          - os: ubuntu-latest
            runtime: linux-arm64
            framework: net10.0
            file_name: XmlDocToMd

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./ROBdk97.XmlDocToMd.csproj

      - name: Publish
        run: dotnet publish ./ROBdk97.XmlDocToMd.csproj -f ${{ matrix.framework }} -r ${{ matrix.runtime }} -c Release --no-restore -o publish/${{ matrix.runtime }} -p:PublishSingleFile=true --self-contained

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v5
        with:
          name: XmlDocToMd-${{ matrix.runtime }}
          path: publish/${{ matrix.runtime }}/${{ matrix.file_name }}
          # This directly specifies the output file based on the runtime

  release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release
      - name: Rename files based on runtime
        run: |
          cd release
          for dir in XmlDocToMd-*; do
            runtime="${dir#XmlDocToMd-}"
            file=$(find "$dir" -type f -name "*")
            if [[ "$runtime" == "win-x64" ]]; then
              mv "$file" "${dir}/XmlDocToMd-$runtime.exe"
            else
              mv "$file" "${dir}/XmlDocToMd-$runtime"
            fi
          done

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*/*
